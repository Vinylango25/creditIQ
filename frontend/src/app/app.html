<!-- CreditIQ — Risk Intelligence Platform -->

<!-- Mobile overlay -->
<div class="mobile-nav-overlay" [class.open]="mobileOpen()" (click)="closeMobile()"></div>

<!-- Mobile drawer -->
<div class="mobile-nav-drawer" [class.open]="mobileOpen()">
  <div class="drawer-header">
    <span class="drawer-brand">⚡ CreditIQ</span>
    <button class="drawer-close" (click)="closeMobile()">✕</button>
  </div>
  <ng-container *ngFor="let group of navGroups">
    <div class="drawer-group">
      <div class="drawer-group-label">{{ group.icon }} {{ group.label }}</div>
      <ng-container *ngFor="let sub of subNav[group.primary] || []">
        <button class="drawer-link"
                [class.active]="isItemActive(sub.path)"
                (click)="router.navigate([sub.path])">
          <span class="dl-icon">{{ group.icon }}</span>
          {{ sub.label }}
        </button>
      </ng-container>
    </div>
  </ng-container>
</div>

<div class="shell">

  <!-- ════════ HEADER ════════ -->
  <header class="header">

    <a class="brand" routerLink="/dashboard">
      <div class="brand__icon">⚡</div>
      <div class="brand__text">
        <span class="brand__name">CreditIQ</span>
        <span class="brand__by">Risk Intelligence</span>
      </div>
    </a>

    <!-- Desktop tabs -->
    <nav class="main-tabs">
      <button *ngFor="let group of navGroups"
              class="main-tab"
              [class.main-tab--active]="isGroupActive(group)"
              (click)="router.navigate([group.primary])">
        <span class="main-tab__icon">{{ group.icon }}</span>
        <span class="main-tab__label">{{ group.label }}</span>
      </button>
    </nav>

    <div class="header-right">
      <button class="icon-btn" (click)="theme.toggle()"
              [title]="theme.isDark() ? 'Light mode' : 'Dark mode'">
        {{ theme.isDark() ? '☀️' : '🌙' }}
      </button>
      <!-- Mobile menu button -->
      <button class="mobile-menu-btn" (click)="toggleMobile()" aria-label="Open menu">
        ☰
      </button>
    </div>

  </header>

  <!-- ════════ SUB-NAV ════════ -->
  <div class="subnav" *ngIf="hasSubNav">
    <a *ngFor="let sub of getSubNav()"
       class="subnav-pill"
       [routerLink]="sub.path"
       routerLinkActive="subnav-pill--active">
      {{ sub.label }}
    </a>
  </div>

  <!-- ════════ CONTENT ════════ -->
  <main class="main-content">
    <router-outlet />
  </main>

</div>
