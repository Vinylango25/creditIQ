services:
  - type: web
    name: creditiq-api
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SESSION_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://browser-psi-opal.vercel.app
      - key: KMP_DUPLICATE_LIB_OK
        value: "TRUE"
      - key: DB_MODE
        value: sqlite
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: creditiq-data
      mountPath: /data
      sizeGB: 2
    healthCheckPath: /api/health
    autoDeploy: true
